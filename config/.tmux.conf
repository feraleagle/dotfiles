##### ─────────────────────────────
##### 🔑 PREFIX CONFIG
##### ─────────────────────────────

# Disable default prefix
unbind C-b

bind C-Space send-prefix
set -g prefix C-Space

# Allow repeatable commands
set -g repeat-time 500

bind-key -n F5 new-window
bind-key -n F6 previous-window
bind-key -n F7 next-window

bind-key -n F9 split-window -h
bind-key -n F10 split-window -v
bind -n C-M-h select-pane -L
bind -n C-M-j select-pane -D
bind -n C-M-k select-pane -U
bind -n C-M-l select-pane -R

bind -n C-M-Left  resize-pane -L 5
bind -n C-M-Right resize-pane -R 5
bind -n C-M-Up    resize-pane -U 3
bind -n C-M-Down  resize-pane -D 3

##### ─────────────────────────────
##### 🎨 COBALT2 STYLE THEME
##### ─────────────────────────────

# Base colors (Cobalt2 inspired palette)
set -g status-bg "#193549"
set -g status-fg "#ffffff"

set -g window-status-current-style bg="#ff9d00",fg="#193549,bold"
set -g window-status-style fg="#b5b5b5",bg="#193549"

set -g pane-border-style fg="#2c3e50"
set -g pane-active-border-style fg="#ff9d00"

# Status bar alignment
set -g status-left "#[fg=#ff9d00] ⚡ tmux #[fg=#ffffff]| "
set -g status-right "#[fg=#b5b5b5]%Y-%m-%d #[fg=#ff9d00]%H:%M"

set -g status-interval 5


##### ─────────────────────────────
##### 🧩 MOUSE + UX
##### ─────────────────────────────

set -g mouse on
setw -g mode-keys vi

# Faster escape delay
set -sg escape-time 10

# TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto save & restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'   # minutes

run '~/.tmux/plugins/tpm/tpm'

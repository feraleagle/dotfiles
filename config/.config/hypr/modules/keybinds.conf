# ============================================================
# Keybindings
# ============================================================

$mainMod  = ALT
$mediaMod = SUPER

$terminal    = kitty
$fileManager = thunar

# ── Core WM ────────────────────────────────────────────────
bind = $mainMod,       Q,     exec,          $terminal
bind = $mainMod,       C,     killactive
bind = $mainMod,       E,     exec,          $fileManager
bind = $mainMod,       V,     togglefloating
bind = $mainMod,       R,     exec,          ~/.config/rofi/launchers/type-2/launcher.sh || pkill rofi
bind = $mainMod SHIFT, f,     fullscreen

# ── Focus Movement ─────────────────────────────────────────
bind = $mainMod SHIFT, h, movefocus, l
bind = $mainMod SHIFT, l, movefocus, r
bind = $mainMod SHIFT, k, movefocus, u
bind = $mainMod SHIFT, j, movefocus, d

# ── Workspaces ─────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

workspace = 1, defaultName:WEB,      persistent:true
workspace = 2, defaultName:TRM,      persistent:true
workspace = 3, defaultName:CORTEX-C, persistent:true
workspace = 4, defaultName:EXP,      persistent:true
workspace = 5, defaultName:MIS,      persistent:true

# ── Move Window to Workspace ───────────────────────────────
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Special Workspaces ─────────────────────────────────────
# General Purpose 
bind = $mainMod SHIFT,  S, togglespecialworkspace, magic
bind = $mainMod SHIFT, F1, movetoworkspace,        special:magic
# Music Workspace
bind = $mainMod SHIFT,  A, togglespecialworkspace, music
bind = $mainMod SHIFT, F2, movetoworkspace,        music
# PDF and Documents
bind = $mainMod SHIFT,  D, togglespecialworkspace, pdf
bind = $mainMod SHIFT, F3, movetoworkspace,        pdf

# ── Scroll Workspaces ──────────────────────────────────────
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up,   workspace, e+1

# ── Floating Terminal ──────────────────────────────────────
bind = $mainMod SHIFT, Q, exec, $terminal --class floating-term

# ── Window Move / Resize (Mouse) ───────────────────────────
bindm = $mainMod,       mouse:272, movewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow

# ── Clipboard History ──────────────────────────────────────
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -p "Show Clipboard History" -theme ~/.config/rofi/launchers/type-2/style-2.rasi | cliphist decode | wl-copy

# ── Screenshots (Hyprshot) ─────────────────────────────────
bind = $mainMod,  PRINT, exec, hyprshot -m window -o $HOME/pictures/screenshots/
bind = ,          PRINT, exec, hyprshot -m output -o $HOME/pictures/screenshots/
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m region -o $HOME/pictures/screenshots/

# ── App Shortcuts ──────────────────────────────────────────
bind = $mainMod, B, exec, firefox
bind = $mainMod, A, exec, fooyin
bind = $mainMod, N, exec, kitty --class kitty-nvim -e nvim $HOME/programming/
bind = $mainMod, O, exec, okular

# ── Media Controls (fooyin) ────────────────────────────────
bindl  = $mediaMod, Space, exec, playerctl -p fooyin play-pause
bindl  = $mediaMod, Left,  exec, playerctl -p fooyin previous
bindl  = $mediaMod, Right, exec, playerctl -p fooyin next
bindle = $mediaMod, Up,    exec, playerctl -p fooyin volume 0.01+
bindle = $mediaMod, Down,  exec, playerctl -p fooyin volume 0.01-

# ── Resize Windows with Keys ───────────────────────────────
binde = SUPER, L, resizeactive, 30 0       # Grow width
binde = SUPER, H,  resizeactive, -30 0     # Shrink width
binde = SUPER, J,    resizeactive, 0 -10   # Shrink height
binde = SUPER, K,  resizeactive, 0 10      # Grow height
